<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 260" width="900" height="260">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Virgil:wght@400&amp;display=swap');
      .hand-text { font-family: 'Virgil', 'Segoe UI', system-ui, sans-serif; }
    </style>
    <filter id="rough" x="-2%" y="-2%" width="104%" height="104%">
      <feTurbulence type="turbulence" baseFrequency="0.03" numOctaves="4" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="1.2" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8f9fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e9ecef;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="brainGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a78bfa;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="260" rx="16" fill="url(#bgGrad)" stroke="#dee2e6" stroke-width="2"/>

  <!-- Brain icon - hand-drawn style -->
  <g transform="translate(100, 130)" filter="url(#rough)">
    <!-- Brain shape -->
    <path d="M-40,-35 C-40,-55 -20,-65 0,-60 C20,-65 40,-55 40,-35 C50,-30 55,-15 50,0 C55,15 50,30 40,35 C35,45 20,50 0,48 C-20,50 -35,45 -40,35 C-50,30 -55,15 -50,0 C-55,-15 -50,-30 -40,-35Z"
          fill="url(#brainGrad)" stroke="#5b21b6" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Brain folds -->
    <path d="M0,-58 C0,-30 -5,0 0,46" stroke="#5b21b6" stroke-width="1.8" fill="none" stroke-linecap="round" opacity="0.6"/>
    <path d="M-30,-42 C-15,-25 -10,-5 -25,30" stroke="#5b21b6" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.5"/>
    <path d="M28,-42 C15,-25 12,-5 22,28" stroke="#5b21b6" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.5"/>
    <!-- Sparkle dots -->
    <circle cx="-15" cy="-25" r="3" fill="#fbbf24" opacity="0.9"/>
    <circle cx="18" cy="-10" r="2.5" fill="#34d399" opacity="0.9"/>
    <circle cx="-8" cy="15" r="2" fill="#60a5fa" opacity="0.9"/>
    <circle cx="12" cy="22" r="2.8" fill="#f472b6" opacity="0.8"/>
  </g>

  <!-- Connection lines from brain -->
  <g stroke="#a78bfa" stroke-width="1.5" fill="none" opacity="0.4" stroke-dasharray="6,4" filter="url(#rough)">
    <path d="M155,105 C180,85 200,80 225,85"/>
    <path d="M155,135 C185,135 200,132 225,125"/>
    <path d="M155,155 C180,170 200,175 225,168"/>
  </g>

  <!-- Title -->
  <text x="240" y="110" class="hand-text" font-size="52" font-weight="bold" fill="#1e1e1e" filter="url(#rough)">Oh-My-Brain</text>

  <!-- Tagline -->
  <text x="242" y="148" class="hand-text" font-size="18" fill="#6b7280" filter="url(#rough)">Your Obsidian-powered Second Brain</text>

  <!-- Feature pills -->
  <g filter="url(#rough)">
    <!-- Knowledge -->
    <rect x="242" y="168" rx="12" ry="12" width="130" height="28" fill="#ede9fe" stroke="#8b5cf6" stroke-width="1.5"/>
    <text x="307" y="187" text-anchor="middle" class="hand-text" font-size="13" fill="#6d28d9">📚 Knowledge</text>

    <!-- Agents -->
    <rect x="382" y="168" rx="12" ry="12" width="145" height="28" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="454" y="187" text-anchor="middle" class="hand-text" font-size="13" fill="#1d4ed8">🤖 Multi-Agent</text>

    <!-- Plugin -->
    <rect x="537" y="168" rx="12" ry="12" width="110" height="28" fill="#d1fae5" stroke="#10b981" stroke-width="1.5"/>
    <text x="592" y="187" text-anchor="middle" class="hand-text" font-size="13" fill="#047857">🔌 Plugin</text>

    <!-- Clippings -->
    <rect x="657" y="168" rx="12" ry="12" width="120" height="28" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
    <text x="717" y="187" text-anchor="middle" class="hand-text" font-size="13" fill="#b45309">✂️ Clippings</text>
  </g>

  <!-- Decorative sketchy elements -->
  <g opacity="0.12" filter="url(#rough)">
    <circle cx="810" cy="55" r="25" stroke="#a78bfa" stroke-width="2" fill="none"/>
    <circle cx="830" cy="70" r="15" stroke="#60a5fa" stroke-width="1.5" fill="none"/>
    <path d="M780,210 L795,195 L810,215 L825,200" stroke="#34d399" stroke-width="1.5" fill="none"/>
  </g>
</svg>